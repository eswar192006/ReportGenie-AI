version: '3.8'

services:
  backend:
    build: .
    container_name: reportgenie-backend
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - CORS_ALLOW_ORIGINS=http://localhost:5173
    volumes:
      - ./outputs:/app/outputs
      - ./sample_data:/app/sample_data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: reportgenie-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  outputs:
  sample_data:
